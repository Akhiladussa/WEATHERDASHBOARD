<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/animejs@3.2.0/lib/anime.min.js"></script>
    <style>
        /* Custom styles for the dynamic background */
        #dynamic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.6;
            background: rgba(255, 255, 255, 0.084); /* Default particle color */
        }
    </style>
</head>
<body class="bg-gray-900 font-roboto text-white">
    <div id="dynamic-bg"></div> <div class="container mx-auto p-4 md:p-6 lg:p-8">
        <h1 class="text-3xl md:text-4xl lg:text-5xl font-semibold text-center mb-6 md:mb-8 lg:mb-10 bg-gradient-to-r from-blue-400 to-purple-500 text-transparent bg-clip-text">
            Weather Dashboard
        </h1>
        <div class="bg-gray-800 rounded-lg shadow-lg p-4 md:p-6 lg:p-8 mb-6 md:mb-8 lg:mb-10">
            <div class="flex flex-col md:flex-row items-center justify-center gap-4 md:gap-6 lg:gap-8">
                <input
                    type="text"
                    id="location-input"
                    placeholder="Enter location..."
                    class="w-full md:w-auto px-4 py-2 rounded-md bg-gray-700 text-white focus:outline-none focus:ring-2 focus:ring-blue-400 font-mono"
                />
                <button id="search-button" class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-2 rounded-md shadow-md transition duration-300 font-mono">
                    Search
                </button>
            </div>
        </div>
        <div id="weather-report" class="bg-gray-800 rounded-lg shadow-lg p-4 md:p-6 lg:p-8 hidden">
            <div class="text-center mb-4 md:mb-6 lg:mb-8">
                <h2 id="location-name" class="text-2xl md:text-3xl lg:text-4xl font-semibold text-white">--</h2>
                <p id="date-time" class="text-gray-300 text-sm md:text-base lg:text-lg"></p>
            </div>
            <div class="flex flex-col md:flex-row items-center justify-center gap-6 md:gap-8 lg:gap-10 mb-6 md:mb-8 lg:mb-10">
                <div id="temperature-container" class="flex items-center gap-4">
                    <img id="weather-icon" src="" alt="Weather Icon" class="w-16 md:w-20 lg:w-24">
                    <p id="temperature" class="text-4xl md:text-5xl lg:text-6xl font-bold text-white">--°C</p>
                </div>
                <div id="weather-description" class="text-xl md:text-2xl lg:text-3xl text-gray-200">--</div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6 lg:gap-8">
                <div>
                    <div class="bg-gray-700 rounded-md p-3 md:p-4 lg:p-5">
                        <h3 class="text-lg md:text-xl lg:text-2xl font-semibold text-gray-300 mb-2">Humidity</h3>
                        <p id="humidity" class="text-xl md:text-2xl lg:text-3xl text-white">--%</p>
                    </div>
                </div>
                <div>
                    <div class="bg-gray-700 rounded-md p-3 md:p-4 lg:p-5">
                        <h3 class="text-lg md:text-xl lg:text-2xl font-semibold text-gray-300 mb-2">Wind Speed</h3>
                        <p id="wind-speed" class="text-xl md:text-2xl lg:text-3xl text-white">-- m/s</p>
                    </div>
                </div>
                <div>
                    <div class="bg-gray-700 rounded-md p-3 md:p-4 lg:p-5">
                        <h3 class="text-lg md:text-xl lg:text-2xl font-semibold text-gray-300 mb-2">Pressure</h3>
                        <p id="pressure" class="text-xl md:text-2xl lg:text-3xl text-white">-- hPa</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Get references to HTML elements
        const locationInput = document.getElementById('location-input');
        const searchButton = document.getElementById('search-button');
        const weatherReport = document.getElementById('weather-report');
        const locationName = document.getElementById('location-name');
        const dateTimeDisplay = document.getElementById('date-time');
        const temperatureDisplay = document.getElementById('temperature');
        const weatherIcon = document.getElementById('weather-icon');
        const weatherDescription = document.getElementById('weather-description');
        const humidityDisplay = document.getElementById('humidity');
        const windSpeedDisplay = document.getElementById('wind-speed');
        const pressureDisplay = document.getElementById('pressure');
        const dynamicBackground = document.getElementById('dynamic-bg');

        // Weather API Key
        const apiKey = 'aa90fbd820c9ef57c4834975db0d8441'; 

        // Function to fetch weather data from OpenWeatherMap API
        async function getWeatherData(location) {
            try {
                const response = await fetch(
                    `https://api.openweathermap.org/data/2.5/weather?q=${location}&appid=${apiKey}&units=metric`
                );
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();
                return data;
            } catch (error) {
                console.error('Error fetching weather data:', error);
                // Handle error (e.g., display a message to the user)
                return null;
            }
        }

        // Function to update the UI with weather data
        function updateUI(weatherData) {
            if (!weatherData) {
                // Handle the case where no data was received (e.g., due to an error)
                locationName.textContent = 'Location Not Found';
                dateTimeDisplay.textContent = '';
                temperatureDisplay.textContent = '--°C';
                weatherIcon.src = '';
                weatherDescription.textContent = '--';
                humidityDisplay.textContent = '--%';
                windSpeedDisplay.textContent = '-- m/s';
                pressureDisplay.textContent = '-- hPa';
                weatherReport.classList.add('hidden');
                return;
            }

            const { name, main, weather, wind, sys } = weatherData;

            // Update location name and date/time
            locationName.textContent = name;
            const now = new Date();
            const dateTimeString = now.toLocaleString('en-US', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: 'numeric',
                minute: 'numeric',
            });
            dateTimeDisplay.textContent = dateTimeString;

            // Update temperature and weather icon
            const temperature = Math.round(main.temp);
            temperatureDisplay.textContent = `${temperature}°C`;
            const iconCode = weather[0].icon;
            const iconUrl = `https://openweathermap.org/img/wn/${iconCode}@2x.png`;
            weatherIcon.src = iconUrl;
            weatherIcon.alt = weather[0].description;
            weatherDescription.textContent = weather[0].description;

            // Update humidity, wind speed, and pressure
            humidityDisplay.textContent = `${main.humidity}%`;
            windSpeedDisplay.textContent = `${wind.speed} m/s`;
            pressureDisplay.textContent = `${main.pressure} hPa`;

            // Show the weather report section
            weatherReport.classList.remove('hidden');

            // Set dynamic background based on weather conditions
            setDynamicBackground(weather[0].main, temperature);
        }

        // Function to set dynamic background based on weather conditions
        function setDynamicBackground(condition, temperature) {
            dynamicBackground.innerHTML = ''; // Clear previous particles

            let baseColor = 'rgba(255, 255, 255, 0.2)'; // Default particle color
            let particleCount = 200; // Default particle count
            let animationDuration = 2000; // Default animation duration
            let sizeFactor = 1;

            switch (condition) {
                case 'Clear':
                    baseColor = 'rgba(255, 255, 255, 0.2)'; // Faint white for clear
                    particleCount = 100;
                    animationDuration = 3000;
                    sizeFactor = 0.8;
                    if (temperature > 30) {
                         baseColor = 'rgba(255, 204, 102, 0.2)'; // Light orange for hot
                    }
                    break;
                case 'Clouds':
                    baseColor = 'rgba(192, 192, 192, 0.3)'; // Gray for clouds
                    particleCount = 150;
                    animationDuration = 2500;
                    sizeFactor = 1;
                    break;
                case 'Rain':
                case 'Drizzle':
                    baseColor = 'rgba(0, 149, 237, 0.4)'; // Blue for rain
                    particleCount = 250;
                    animationDuration = 1500;
                    sizeFactor = 1.2;
                    break;
                case 'Snow':
                    baseColor = 'rgba(255, 255, 255, 0.5)'; // White for snow
                    particleCount = 300;
                    animationDuration = 2000;
                    sizeFactor = 1;
                    break;
                case 'Thunderstorm':
                    baseColor = 'rgba(255, 255, 0, 0.4)'; // Yellow for lightning
                    particleCount = 100;
                    animationDuration = 1000;
                    sizeFactor = 1.5;
                    break;
                case 'Mist':
                case 'Fog':
                    baseColor = 'rgba(192, 192, 192, 0.2)'; // Light gray
                    particleCount = 200;
                    animationDuration = 2500;
                    sizeFactor = 1;
                    break;
                default:
                    baseColor = 'rgba(255, 255, 255, 0.2)'; // Default
                    particleCount = 150;
                    animationDuration = 3000;
                    sizeFactor = 1;
            }

            // Create particles
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.backgroundColor = baseColor;
                const x = Math.random() * 100;
                const y = Math.random() * 100;
                const size = (Math.random() * 8 + 2) * sizeFactor; // Adjust size
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${x}vw`;
                particle.style.top = `${y}vh`;
                dynamicBackground.appendChild(particle);

                // Animate particles
                anime({
                    targets: particle,
                    translateY: ['0vh', '100vh'],
                    translateX: [`${x}vw`, `${x + (Math.random() - 0.5) * 20}vw`],
                    duration: animationDuration,
                    easing: 'linear',
                    loop: true,
                    delay: i * 100,
                });
            }
        }

        // Event listener for the search button
        searchButton.addEventListener('click', async () => {
            const location = locationInput.value.trim();
            if (location) {
                const weatherData = await getWeatherData(location);
                updateUI(weatherData);
            } else {
                alert('Please enter a location.');
            }
            locationInput.value = ''; // Clear input after search
        });

        // Event listener for Enter key press in the input field
        locationInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                searchButton.click();
            }
        });

        // Initial background animation on page load
        setDynamicBackground('Clear', 20); // Default background.
    </script>
</body>
</html>
