<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Animated Weather Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:linear-gradient(135deg,#0f172a,#1e293b);
overflow:hidden;
}

.weather-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

/* sun */

.sun{
width:120px;
height:120px;
background:radial-gradient(circle,#FFD93D,#FFA500);
border-radius:50%;
position:absolute;
top:80px;
right:100px;
animation:spin 20s linear infinite;
box-shadow:0 0 60px #FFD93D;
}

@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}

/* moon */

.moon{
width:100px;
height:100px;
background:#ddd;
border-radius:50%;
position:absolute;
top:80px;
right:100px;
box-shadow:0 0 30px #fff;
}

/* stars */

.star{
width:3px;
height:3px;
background:white;
position:absolute;
border-radius:50%;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:0.2}
to{opacity:1}
}

/* rain */

.rain{
position:absolute;
width:2px;
height:15px;
background:#8ecae6;
animation:rain 0.7s linear infinite;
}

@keyframes rain{
0%{
transform:translateY(-100px);
opacity:1;
}

100%{
transform:translateY(600px);
opacity:0;
}
}

.glass{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.1);
}

</style>

</head>

<body class="text-white flex items-center justify-center min-h-screen p-6">

<div id="bg" class="weather-bg"></div>

<div class="glass rounded-xl shadow-xl p-6 w-full max-w-xl">

<h1 class="text-3xl font-bold mb-6 text-center">
Weather Dashboard
</h1>

<div class="flex gap-3 mb-6">

<input
id="city"
type="text"
placeholder="Enter city..."
class="flex-1 p-3 rounded-lg bg-gray-800 outline-none"
/>

<button
onclick="getWeather()"
class="bg-blue-500 px-5 rounded-lg hover:bg-blue-600"
>
Search
</button>

</div>

<div id="weatherCard" class="hidden text-center">

<h2 id="cityName" class="text-2xl font-semibold"></h2>

<img id="icon" class="mx-auto w-20">

<h1 id="temp" class="text-5xl font-bold"></h1>

<p id="description" class="capitalize"></p>

<p class="mt-4">Humidity: <span id="humidity"></span>%</p>

<p>Wind: <span id="wind"></span> m/s</p>

<p class="mt-3">Season: <span id="season"></span></p>

<ul id="suggestions" class="mt-4"></ul>

</div>

</div>

<script>

const apiKey="aa90fbd820c9ef57c4834975db0d8441";

async function getWeather(){

const city=document.getElementById("city").value;

const res=await fetch(
`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`
);

const data=await res.json();

updateUI(data);

}

function updateUI(data){

document.getElementById("weatherCard").classList.remove("hidden");

document.getElementById("cityName").innerText=data.name;

document.getElementById("temp").innerText=Math.round(data.main.temp)+"°C";

document.getElementById("description").innerText=data.weather[0].description;

document.getElementById("humidity").innerText=data.main.humidity;

document.getElementById("wind").innerText=data.wind.speed;

document.getElementById("icon").src=
`https://openweathermap.org/img/wn/${data.weather[0].icon}@2x.png`;

const season=getSeason(data.main.temp);

document.getElementById("season").innerText=season;

generateSuggestions(data.main.temp,data.weather[0].main);

updateBackground(data.weather[0].main);

}

function getSeason(temp){

if(temp>32) return "Summer";
if(temp>20) return "Spring";
if(temp>10) return "Autumn";
return "Winter";

}

function generateSuggestions(temp,condition){

const list=document.getElementById("suggestions");

list.innerHTML="";

let tips=[];

if(condition==="Rain") tips.push("Carry umbrella ☔");

if(temp>35) tips.push("Stay hydrated 💧");

if(temp<12) tips.push("Wear warm clothes 🧥");

if(condition==="Clear") tips.push("Great day outside ☀️");

tips.forEach(t=>{
let li=document.createElement("li");
li.innerText=t;
list.appendChild(li);
});

}

function updateBackground(condition){

const bg=document.getElementById("bg");

bg.innerHTML="";

const hour=new Date().getHours();

if(hour>=6 && hour<=18){

const sun=document.createElement("div");
sun.className="sun";
bg.appendChild(sun);

}else{

const moon=document.createElement("div");
moon.className="moon";
bg.appendChild(moon);

for(let i=0;i<80;i++){

const star=document.createElement("div");

star.className="star";

star.style.left=Math.random()*100+"%";

star.style.top=Math.random()*100+"%";

bg.appendChild(star);

}

}

if(condition==="Rain"){

for(let i=0;i<100;i++){

const drop=document.createElement("div");

drop.className="rain";

drop.style.left=Math.random()*100+"%";

drop.style.animationDelay=Math.random()+"s";

bg.appendChild(drop);

}

}

}

</script>

</body>

</html>
